name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project and development tools
        run: python -m pip install --upgrade pip ".[dev]"
      - name: CLI smoke test
        run: forge --help
      - name: Lint
        run: ruff check .
      - name: Type check
        run: pyright
      - name: Test
        run: pytest
      - name: Build distributions
        run: python -m build

